name: HA Dispatch
version: "0.1.5"
slug: ha_dispatch
description: Durable, AI-native automation runtime for Home Assistant
arch:
  - aarch64
  - amd64
url: "https://github.com/markusahlstrand/ha-dispatch"
init: false
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:lightning-bolt-circle
panel_title: Dispatch
options:
  log_level: info
  llm_provider: none
  llm_api_key: ""
  enabled_flows:
    - energy-optimizer
  price_provider: pvpc
  solcast_api_key: ""
  solcast_resource_id: ""
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  llm_provider: list(gemini|openai|anthropic|none)
  llm_api_key: str?
  enabled_flows:
    - str
  price_provider: list(pvpc|tibber|octopus|awattar|none)
  solcast_api_key: str?
  solcast_resource_id: str?
